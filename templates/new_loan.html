{% extends "base.html" %}

{% block title %}Nuevo préstamo{% endblock %}

{% block content %}
<div class="card">
    <h2>Nuevo préstamo para {{ client.name }}</h2>

    <form method="post">
        <label>Monto total</label>
        <input type="number" step="0.01" name="amount_total" required>

        <label>Cantidad de cuotas</label>
        <input type="number" name="installment_count" min="1" required>

        <label>Fecha de inicio</label>
        <input type="date" name="start_date" required>

        <label>Nota inicial</label>
        <textarea name="initial_note" rows="3"></textarea>

        <button type="submit">Guardar préstamo</button>
    </form>
</div>
{% endblock %}
